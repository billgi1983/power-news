<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>台電新聞摘要建議卡片</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f2f4f7;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .header-container {
      background-color: #ffffff;
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 5px rgba(0,0,0,0.05);
      z-index: 10;
      height: 45px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: bold;
      color: #0088cc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .subtitle {
      color: #8e8e93;
      font-size: 12px;
      white-space: nowrap;
      margin-left: 10px;
    }
    .scroll-container {
      flex: 1;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-container::-webkit-scrollbar {
      display: none;
    }
    .card-wrapper {
      flex: 0 0 100%;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
      scroll-snap-align: start;
      padding: 12px;
    }
    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      width: 100%;
      max-width: 480px;
      height: 82vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      box-sizing: border-box;
      position: relative;
    }
    .card-content {
      font-size: 16px;
      line-height: 1.5;
      color: #222222;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      flex: 1;
      margin-bottom: 15px;
      padding-right: 5px;
    }
    .delete-btn {
      background-color: #ff3b30;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s;
    }
    .delete-btn:active {
      background-color: #d63026;
    }
    .status-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 16px;
      color: #8e8e93;
      text-align: center;
      width: 80%;
    }
  </style>
</head>
<body>

  <div class="header-container">
    <h1 id="current-title">載入中...</h1>
    <div class="subtitle" id="card-index">第 -- / -- 則</div>
  </div>

  <div class="scroll-container" id="scroll-container">
    <div class="status-msg" id="loading-msg">正在從 Google Sheet 讀取資料...</div>
  </div>

<script>
  // ==================== 填入您的試算表設定 ====================
  const SPREADSHEET_ID = "1pV9ojt20MZL7Dz12sLaaWjQ78hZ30cMQgMGd930cgSk"; 
  const SHEET_NAME = "工作表1"; 
  // =========================================================

  const SPECIAL_TITLES = ["台電新聞", "台電網路新聞", "台電網路熱門討論"];
  let ALL_CARDS = [];
  let API_KEY = localStorage.getItem('G_SHEET_API_KEY');

  window.onload = function() {
    if (!API_KEY) {
      API_KEY = prompt("請輸入您的 Google Sheets API 金鑰以瀏覽卡片：");
      if (API_KEY) {
        localStorage.setItem('G_SHEET_API_KEY', API_KEY);
      } else {
        alert("未輸入金鑰，無法載入資料。");
        document.getElementById('loading-msg').innerText = "請重新整理網頁並輸入金鑰。";
        return;
      }
    }
    loadDataFromGoogleSheet();

    const container = document.getElementById('scroll-container');
    container.addEventListener('scroll', () => {
      if (ALL_CARDS.length === 0) return;
      const width = container.clientWidth;
      const index = Math.round(container.scrollLeft / width);
      if (ALL_CARDS[index]) {
        document.getElementById('current-title').innerText = ALL_CARDS[index].title;
        document.getElementById('card-index').innerText = `第 ${index + 1} / ${ALL_CARDS.length} 則`;
      }
    });
  };

  function loadDataFromGoogleSheet() {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A1:A1000?key=${API_KEY}`;
    
    fetch(url)
      .then(res => {
        if (!res.ok) throw new Error("金鑰錯誤或試算表未公開編輯者權限");
        return res.json();
      })
      .then(data => {
        parseAndRender(data.values);
      })
      .catch(err => {
        console.error(err);
        localStorage.removeItem('G_SHEET_API_KEY');
        document.getElementById('loading-msg').innerText = "讀取失敗，可能是 API 金鑰無效，請重新整理網頁再試一次。";
      });
  }

  function parseAndRender(rows) {
    const container = document.getElementById('scroll-container');
    container.innerHTML = '';
    ALL_CARDS = [];

    if (!rows || rows.length === 0) {
      container.innerHTML = '<div class="status-msg">目前沒有任何摘要資料。</div>';
      document.getElementById('current-title').innerText = '無資料';
      document.getElementById('card-index').innerText = '';
      return;
    }

    let currentTitle = "未分類新聞";

    rows.forEach((row, idx) => {
      if (!row || row.length === 0) return;
      const text = row[0].trim();
      const actualRowNumber = idx + 1; 

      if (SPECIAL_TITLES.includes(text)) {
        currentTitle = text; 
      } else if (text !== "") {
        ALL_CARDS.push({
          row: actualRowNumber,
          text: text,
          title: currentTitle
        });
      }
    });

    if (ALL_CARDS.length === 0) {
      container.innerHTML = '<div class="status-msg">目前沒有任何摘要卡片。</div>';
      document.getElementById('current-title').innerText = '無資料';
      document.getElementById('card-index').innerText = '';
      return;
    }

    ALL_CARDS.forEach((card, index) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';
      wrapper.id = `card-wrapper-${card.row}`;
      wrapper.innerHTML = `
        <div class="card">
          <div class="card-content">${card.text}</div>
          <button class="delete-btn" onclick="deleteRowFromGoogle(${card.row})">刪除此卡片</button>
        </div>
      `;
      container.appendChild(wrapper);
    });

    document.getElementById('current-title').innerText = ALL_CARDS[0].title;
    document.getElementById('card-index').innerText = `第 1 / ${ALL_CARDS.length} 則`;
  }

  function deleteRowFromGoogle(rowNumber) {
    if (!confirm("確定要從 Google 試算表中刪除這一列嗎？")) return;

    const btn = document.querySelector(`#card-wrapper-${rowNumber} .delete-btn`);
    btn.innerText = "正在從雲端刪除...";
    btn.disabled = true;

    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}:batchUpdate?key=${API_KEY}`;
    
    const body = {
      requests: [
        {
          deleteDimension: {
            range: {
              sheetId: 0, 
              dimension: "ROWS",
              startIndex: rowNumber - 1, 
              endIndex: rowNumber
            }
          }
        },
        {
          appendDimension: {
            sheetId: 0,
            dimension: "ROWS",
            length: 1
          }
        }
      ]
    };

    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(res => {
      if (!res.ok) throw new Error("刪除失敗");
      return res.json();
    })
    .then(result => {
      alert("刪除並補列成功！");
      loadDataFromGoogleSheet(); 
    })
    .catch(err => {
      alert("刪除失敗，請檢查權限或 API 設定。");
      btn.innerText = "刪除此卡片";
      btn.disabled = false;
    });
  }
</script>
</body>
</html>
